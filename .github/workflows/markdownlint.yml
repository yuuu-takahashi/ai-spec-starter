name: Markdown Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-md:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run markdown lint
        run: npm run lint:md
